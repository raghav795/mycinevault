<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <g fill="white">
    <!-- Film strip holes left -->
    <rect x="60" y="80" width="30" height="40" rx="5"/>
    <rect x="60" y="150" width="30" height="40" rx="5"/>
    <rect x="60" y="220" width="30" height="40" rx="5"/>
    <rect x="60" y="290" width="30" height="40" rx="5"/>
    <rect x="60" y="360" width="30" height="40" rx="5"/>
    <!-- Film strip holes right -->
    <rect x="422" y="80" width="30" height="40" rx="5"/>
    <rect x="422" y="150" width="30" height="40" rx="5"/>
    <rect x="422" y="220" width="30" height="40" rx="5"/>
    <rect x="422" y="290" width="30" height="40" rx="5"/>
    <rect x="422" y="360" width="30" height="40" rx="5"/>
    <!-- Center play button / vault door -->
    <circle cx="256" cy="256" r="100" fill="rgba(255,255,255,0.2)"/>
    <circle cx="256" cy="256" r="70" fill="white"/>
    <polygon points="236,210 236,302 306,256" fill="#0f172a"/>
