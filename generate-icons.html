<!DOCTYPE html>
<html>
<head>
  <title>MyCineVault Icon Generator</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; background: #1e293b; color: white; }
    .icons { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .icon-box { text-align: center; }
    canvas { border-radius: 20%; background: #000; }
    button { margin-top: 10px; padding: 8px 16px; background: #0ea5e9; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #0284c7; }
    h1 { color: #38bdf8; }
    .instructions { background: #334155; padding: 20px; border-radius: 10px; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>🎬 MyCineVault Icon Generator</h1>
  
  <div class="instructions">
    <h3>Instructions:</h3>
    <ol>
      <li>Click "Download" for each icon size below</li>
      <li>Save all icons to the <code>icons/</code> folder in your project</li>
      <li>Push to GitHub</li>
    </ol>
  </div>
  
  <div class="icons" id="icons"></div>

  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#0ea5e9');
      gradient.addColorStop(1, '#a855f7');
      
      // Rounded rectangle background
      const radius = size * 0.2;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Film strip holes (left side)
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      const holeWidth = size * 0.06;
      const holeHeight = size * 0.08;
      const holeRadius = size * 0.01;
      const leftX = size * 0.12;
      const positions = [0.16, 0.30, 0.44, 0.58, 0.72];
      
      positions.forEach(pos => {
        ctx.beginPath();
        ctx.roundRect(leftX, size * pos, holeWidth, holeHeight, holeRadius);
        ctx.fill();
      });
      
      // Film strip holes (right side)
      const rightX = size * 0.82;
      positions.forEach(pos => {
        ctx.beginPath();
        ctx.roundRect(rightX, size * pos, holeWidth, holeHeight, holeRadius);
        ctx.fill();
      });
      
      // Center circle (outer)
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
      ctx.fill();
      
      // Center circle (inner white)
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.14, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.fill();
      
      // Play triangle
      ctx.beginPath();
      const playSize = size * 0.08;
      const centerX = size / 2 + playSize * 0.15;
      const centerY = size / 2;
      ctx.moveTo(centerX - playSize, centerY - playSize * 1.1);
      ctx.lineTo(centerX - playSize, centerY + playSize * 1.1);
      ctx.lineTo(centerX + playSize * 0.8, centerY);
      ctx.closePath();
      ctx.fillStyle = '#0f172a';
      ctx.fill();
    }
    
    function downloadIcon(canvas, size) {
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    // Generate all icons
    const container = document.getElementById('icons');
    sizes.forEach(size => {
      const div = document.createElement('div');
      div.className = 'icon-box';
      
      const canvas = document.createElement('canvas');
      const displaySize = Math.min(size, 150);
      canvas.style.width = displaySize + 'px';
      canvas.style.height = displaySize + 'px';
      drawIcon(canvas, size);
      
      const label = document.createElement('p');
      label.textContent = `${size}x${size}`;
      
      const btn = document.createElement('button');
      btn.textContent = 'Download';
      btn.onclick = () => downloadIcon(canvas, size);
      
      div.appendChild(canvas);
      div.appendChild(label);
      div.appendChild(btn);
      container.appendChild(div);
    });
    
    // Download all button
    const allBtn = document.createElement('button');
    allBtn.textContent = '⬇️ Download All Icons';
    allBtn.style.cssText = 'display: block; margin: 30px auto; padding: 15px 30px; font-size: 16px; background: #22c55e;';
    allBtn.onclick = () => {
      sizes.forEach((size, i) => {
        setTimeout(() => {
          const canvas = document.createElement('canvas');
          drawIcon(canvas, size);
          downloadIcon(canvas, size);
        }, i * 300);
      });
    };
    document.body.appendChild(allBtn);
  </script>
</body>
</html>
